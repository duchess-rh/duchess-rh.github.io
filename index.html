<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>My Little Mason Jar — duchess.rh</title>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
  <style>
    :root {
      --bg: #faf7f2;
      --bg2: #f2ece0;
      --text: #2a1f14;
      --text-muted: #8a7060;
      --accent: #b8924a;
      --accent-light: #e8d5b0;
      --border: #ddd0bc;
      --glass: rgba(255,255,255,0.6);
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      font-weight: 300;
      min-height: 100vh;
    }

    /* ── HEADER ── */
    header {
      position: sticky;
      top: 0;
      z-index: 100;
      background: rgba(250,247,242,0.88);
      backdrop-filter: blur(12px);
      border-bottom: 1px solid var(--border);
      padding: 0 2rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
      height: 64px;
    }

    .logo {
      font-family: 'Cormorant Garamond', serif;
      font-size: 1.3rem;
      font-weight: 400;
      letter-spacing: 0.04em;
      color: var(--text);
      text-decoration: none;
    }

    .logo span {
      color: var(--accent);
      font-style: italic;
    }

    .lang-switcher {
      display: flex;
      gap: 0.25rem;
    }

    .lang-btn {
      background: none;
      border: 1px solid transparent;
      padding: 4px 10px;
      font-family: 'DM Sans', sans-serif;
      font-size: 0.75rem;
      font-weight: 400;
      color: var(--text-muted);
      cursor: pointer;
      border-radius: 4px;
      transition: all 0.2s;
      letter-spacing: 0.06em;
    }

    .lang-btn:hover { color: var(--text); border-color: var(--border); }
    .lang-btn.active {
      color: var(--accent);
      border-color: var(--accent);
      background: rgba(184,146,74,0.08);
    }

    /* ── HERO ── */
    .hero {
      padding: 6rem 2rem 4rem;
      max-width: 900px;
      margin: 0 auto;
      text-align: center;
    }

    .hero-eyebrow {
      font-size: 0.7rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--accent);
      margin-bottom: 1.2rem;
    }

    .hero-title {
      font-family: 'Cormorant Garamond', serif;
      font-size: clamp(2.8rem, 6vw, 5rem);
      font-weight: 300;
      line-height: 1.1;
      margin-bottom: 1.5rem;
      color: var(--text);
    }

    .hero-title em {
      font-style: italic;
      color: var(--accent);
    }

    .hero-desc {
      font-size: 0.95rem;
      color: var(--text-muted);
      max-width: 480px;
      margin: 0 auto 2.5rem;
      line-height: 1.8;
    }

    .hero-links {
      display: flex;
      gap: 1rem;
      justify-content: center;
      flex-wrap: wrap;
    }

    .btn {
      display: inline-flex;
      align-items: center;
      gap: 0.4rem;
      padding: 0.6rem 1.4rem;
      font-size: 0.8rem;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      text-decoration: none;
      border-radius: 4px;
      transition: all 0.2s;
      font-family: 'DM Sans', sans-serif;
    }

    .btn-primary {
      background: var(--accent);
      color: #fff;
      border: 1px solid var(--accent);
    }
    .btn-primary:hover { background: #a07a38; border-color: #a07a38; }

    .btn-outline {
      background: transparent;
      color: var(--text);
      border: 1px solid var(--border);
    }
    .btn-outline:hover { border-color: var(--accent); color: var(--accent); }

    /* ── DIVIDER ── */
    .divider {
      display: flex;
      align-items: center;
      gap: 1rem;
      max-width: 900px;
      margin: 0 auto 3rem;
      padding: 0 2rem;
    }
    .divider::before, .divider::after {
      content: '';
      flex: 1;
      height: 1px;
      background: var(--border);
    }
    .divider-icon {
      font-size: 1.1rem;
      color: var(--accent);
    }

    /* ── GRID ── */
    .grid-section {
      max-width: 1100px;
      margin: 0 auto;
      padding: 0 2rem 6rem;
    }

    .section-label {
      font-size: 0.68rem;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--text-muted);
      margin-bottom: 2rem;
    }

    .works-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 1.5rem;
    }

    /* ── CARD ── */
    .card {
      background: var(--glass);
      border: 1px solid var(--border);
      border-radius: 12px;
      overflow: hidden;
      cursor: pointer;
      transition: transform 0.25s, box-shadow 0.25s;
    }

    .card:hover {
      transform: translateY(-4px);
      box-shadow: 0 16px 40px rgba(42,31,20,0.1);
    }

    .card.open {
      grid-column: 1 / -1;
      cursor: default;
      transform: none;
    }

    .card-thumb {
      aspect-ratio: 4/3;
      background: var(--bg2);
      position: relative;
      overflow: hidden;
    }

    .card-thumb img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      transition: transform 0.4s;
    }

    .card:not(.open):hover .card-thumb img {
      transform: scale(1.04);
    }

    .card-thumb-placeholder {
      width: 100%;
      height: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 0.5rem;
    }

    .jar-icon {
      font-size: 3rem;
      opacity: 0.4;
    }

    .card-tag {
      position: absolute;
      top: 12px;
      left: 12px;
      background: rgba(250,247,242,0.9);
      border: 1px solid var(--border);
      padding: 3px 8px;
      font-size: 0.65rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--text-muted);
      border-radius: 3px;
    }

    .card-info {
      padding: 1.2rem 1.4rem;
    }

    .card-title {
      font-family: 'Cormorant Garamond', serif;
      font-size: 1.2rem;
      font-weight: 400;
      margin-bottom: 0.3rem;
    }

    .card-subtitle {
      font-size: 0.78rem;
      color: var(--text-muted);
    }

    .card-toggle {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-top: 0.8rem;
    }

    .toggle-arrow {
      font-size: 0.8rem;
      color: var(--accent);
      transition: transform 0.3s;
    }

    .card.open .toggle-arrow { transform: rotate(180deg); }

    /* ── DETAIL (expanded) ── */
    .card-detail {
      display: none;
      padding: 0 1.4rem 1.4rem;
      animation: fadeIn 0.3s ease;
    }

    .card.open .card-detail { display: block; }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(8px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .detail-images {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
      gap: 0.75rem;
      margin-bottom: 1.2rem;
    }

    .detail-images .img-slot {
      aspect-ratio: 1;
      background: var(--bg2);
      border-radius: 8px;
      overflow: hidden;
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--text-muted);
      font-size: 0.75rem;
    }

    .detail-images .img-slot img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .detail-desc {
      font-size: 0.88rem;
      color: var(--text-muted);
      line-height: 1.8;
      margin-bottom: 1rem;
      max-width: 600px;
    }

    .detail-meta {
      display: flex;
      gap: 0.75rem;
      flex-wrap: wrap;
      align-items: center;
    }

    .meta-chip {
      background: var(--accent-light);
      color: var(--text);
      padding: 4px 10px;
      border-radius: 20px;
      font-size: 0.72rem;
      letter-spacing: 0.04em;
    }

    .detail-link {
      display: inline-flex;
      align-items: center;
      gap: 0.3rem;
      font-size: 0.78rem;
      color: var(--accent);
      text-decoration: none;
      border-bottom: 1px solid var(--accent-light);
      padding-bottom: 1px;
      transition: border-color 0.2s;
    }

    .detail-link:hover { border-color: var(--accent); }

    /* ── FOOTER ── */
    footer {
      border-top: 1px solid var(--border);
      padding: 2rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-wrap: gap;
      max-width: 1100px;
      margin: 0 auto;
    }

    .footer-name {
      font-family: 'Cormorant Garamond', serif;
      font-size: 0.9rem;
      color: var(--text-muted);
    }

    .footer-links {
      display: flex;
      gap: 1.2rem;
    }

    .footer-links a {
      font-size: 0.75rem;
      color: var(--text-muted);
      text-decoration: none;
      letter-spacing: 0.06em;
      transition: color 0.2s;
    }

    .footer-links a:hover { color: var(--accent); }

    /* ── TRANSLATIONS ── */
  </style>
</head>
<body>

<header>
  <a href="#" class="logo">My Little <span>Mason Jar</span></a>
  <div class="lang-switcher">
    <button class="lang-btn active" onclick="setLang('en')">EN</button>
    <button class="lang-btn" onclick="setLang('jp')">JP</button>
    <button class="lang-btn" onclick="setLang('kr')">KR</button>
  </div>
</header>

<section class="hero">
  <p class="hero-eyebrow" data-i18n="eyebrow">3D Art & Digital Creations</p>
  <h1 class="hero-title">
    My Little<br/><em>Mason Jar</em>
  </h1>
  <p class="hero-desc" data-i18n="hero-desc">
    Small worlds, carefully crafted. A collection of 3D artworks by duchess.rh — each piece a tiny universe waiting to be discovered.
  </p>
  <div class="hero-links">
    <a href="https://duchess-rh.booth.pm" target="_blank" class="btn btn-primary" data-i18n="btn-booth">BOOTH Shop</a>
    <a href="https://instagram.com" target="_blank" class="btn btn-outline" data-i18n="btn-insta">Instagram</a>
  </div>
</section>

<div class="divider"><span class="divider-icon">◆</span></div>

<section class="grid-section">
  <p class="section-label" data-i18n="works-label">Works</p>
  <div class="works-grid" id="worksGrid"></div>
</section>

<footer>
  <span class="footer-name">duchess.rh © 2026</span>
  <div class="footer-links">
    <a href="https://duchess-rh.booth.pm" target="_blank">BOOTH</a>
    <a href="https://instagram.com" target="_blank">Instagram</a>
    <a href="mailto:hello@kimrahee.com">Contact</a>
  </div>
</footer>

<script>
  // ── TRANSLATIONS ──
  const i18n = {
    en: {
      eyebrow: '3D Art & Digital Creations',
      'hero-desc': 'Small worlds, carefully crafted. A collection of 3D artworks by duchess.rh — each piece a tiny universe waiting to be discovered.',
      'btn-booth': 'BOOTH Shop',
      'btn-insta': 'Instagram',
      'works-label': 'Works',
      'available': 'Available on',
      'close': 'Close',
    },
    jp: {
      eyebrow: '3Dアート & デジタルクリエーション',
      'hero-desc': '小さな世界を、丁寧に。duchess.rhによる3Dアート作品集 — それぞれが小さな宇宙です。',
      'btn-booth': 'BOOTHショップ',
      'btn-insta': 'Instagram',
      'works-label': '作品一覧',
      'available': '販売中',
      'close': '閉じる',
    },
    kr: {
      eyebrow: '3D 아트 & 디지털 크리에이션',
      'hero-desc': '작은 세계들을 정성껏 담았습니다. duchess.rh의 3D 아트 작품 컬렉션 — 각각의 작품은 작은 우주입니다.',
      'btn-booth': 'BOOTH 샵',
      'btn-insta': '인스타그램',
      'works-label': '작품',
      'available': '판매 중',
      'close': '닫기',
    }
  };

  let currentLang = 'en';

  function setLang(lang) {
    currentLang = lang;
    document.querySelectorAll('.lang-btn').forEach(b => b.classList.remove('active'));
    document.querySelector(`.lang-btn[onclick="setLang('${lang}')"]`).classList.add('active');
    document.querySelectorAll('[data-i18n]').forEach(el => {
      const key = el.getAttribute('data-i18n');
      if (i18n[lang][key]) el.textContent = i18n[lang][key];
    });
    renderWorks();
  }

  // ── WORKS DATA (샘플 — 나중에 교체) ──
  const works = [
    {
      id: 1,
      tag: 'VRChat Avatar',
      title: { en: 'Roa', jp: 'Roa', kr: 'Roa' },
      subtitle: { en: 'Original Avatar', jp: 'オリジナルアバター', kr: '오리지널 아바타' },
      desc: {
        en: 'An original VRChat avatar featuring customizable accessories and Full Tracking support.',
        jp: 'カスタマイズ可能なアクセサリーとフルトラッキング対応のオリジナルVRChatアバターです。',
        kr: '커스터마이즈 가능한 악세서리와 풀트래킹을 지원하는 오리지널 VRChat 아바타입니다.'
      },
      chips: ['Blender', 'Unity', 'lilToon', 'VRChat'],
      link: 'https://duchess-rh.booth.pm',
      linkLabel: { en: 'View on BOOTH', jp: 'BOOTHで見る', kr: 'BOOTH에서 보기' },
      thumb: null,
      images: [null, null, null]
    },
    {
      id: 2,
      tag: 'Outfit',
      title: { en: 'Wedding Dress', jp: 'ウェディングドレス', kr: '웨딩 드레스' },
      subtitle: { en: 'Roa Exclusive Outfit', jp: 'Roa専用衣装', kr: 'Roa 전용 의상' },
      desc: {
        en: 'A white lace mini dress with subtle aurora shimmer. Free outfit for Roa avatar.',
        jp: 'オーロラシマーが入ったホワイトレースのミニドレス。Roaアバター専用フリー衣装。',
        kr: '은은한 오로라 빛이 나는 흰색 레이스 미니 드레스. Roa 아바타 전용 무료 의상.'
      },
      chips: ['Blender', 'Unity', 'lilToon', 'Free'],
      link: 'https://duchess-rh.booth.pm',
      linkLabel: { en: 'Free Download', jp: '無料ダウンロード', kr: '무료 다운로드' },
      thumb: null,
      images: [null, null, null]
    },
    {
      id: 3,
      tag: 'Coming Soon',
      title: { en: '— ', jp: '— ', kr: '— ' },
      subtitle: { en: 'Next work in progress', jp: '次の作品を制作中', kr: '다음 작품 제작 중' },
      desc: {
        en: 'Something new is being crafted...',
        jp: '新しい作品を制作中です...',
        kr: '새로운 작품을 만드는 중입니다...'
      },
      chips: [],
      link: null,
      linkLabel: null,
      thumb: null,
      images: []
    }
  ];

  let openId = null;

  function renderWorks() {
    const grid = document.getElementById('worksGrid');
    grid.innerHTML = '';

    works.forEach(w => {
      const card = document.createElement('div');
      card.className = 'card' + (openId === w.id ? ' open' : '');
      card.dataset.id = w.id;

      const thumbContent = w.thumb
        ? `<img src="${w.thumb}" alt="${w.title[currentLang]}" />`
        : `<div class="card-thumb-placeholder"><span class="jar-icon">🫙</span></div>`;

      const detailImages = w.images.map(img =>
        `<div class="img-slot">${img ? `<img src="${img}" />` : '🫙'}</div>`
      ).join('');

      const linkHtml = w.link
        ? `<a href="${w.link}" target="_blank" class="detail-link">${w.linkLabel[currentLang]} →</a>`
        : '';

      const chipsHtml = w.chips.map(c => `<span class="meta-chip">${c}</span>`).join('');

      card.innerHTML = `
        <div class="card-thumb">
          ${thumbContent}
          <span class="card-tag">${w.tag}</span>
        </div>
        <div class="card-info">
          <div class="card-title">${w.title[currentLang]}</div>
          <div class="card-subtitle">${w.subtitle[currentLang]}</div>
          <div class="card-toggle">
            <span style="font-size:0.72rem;color:var(--text-muted);letter-spacing:0.06em">
              ${openId === w.id ? i18n[currentLang]['close'] : i18n[currentLang]['available'] || ''}
            </span>
            <span class="toggle-arrow">▼</span>
          </div>
        </div>
        <div class="card-detail">
          ${detailImages.length ? `<div class="detail-images">${detailImages}</div>` : ''}
          <p class="detail-desc">${w.desc[currentLang]}</p>
          <div class="detail-meta">
            ${chipsHtml}
            ${linkHtml}
          </div>
        </div>
      `;

      card.addEventListener('click', () => {
        if (openId === w.id) {
          openId = null;
        } else {
          openId = w.id;
        }
        renderWorks();
        if (openId) {
          setTimeout(() => {
            document.querySelector('.card.open')?.scrollIntoView({ behavior: 'smooth', block: 'start' });
          }, 50);
        }
      });

      grid.appendChild(card);
    });
  }

  renderWorks();
</script>
</body>
</html>
